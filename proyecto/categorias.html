body{

text-align:center;
}

/* TITULO */

h1{
color:#ff2f92;
margin-top:30px;
}

/* TABLA */

table{
margin:auto;
border-collapse:collapse;
width:60%;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

th{
background:#ff8fcf;
color:white;
font-size:20px;
padding:15px;
}

td{
padding:15px;
font-size:18px;
color:#ff4da6;
border-bottom:1px solid #ffd6ec;
}

tr:hover{
background:#ffe6f2;
}

/* BRILLITOS */

.brillo{
position:fixed;
top:-10px;
font-size:20px;
color:white;
animation:caer 6s linear infinite;
}

@keyframes caer{
0%{
transform:translateY(-10px);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Playeras</title>

<style>

body{
background:#D1E9F6;
font-family:'Comic Sans MS',cursive;
text-align:center;
margin:0;
overflow-x:hidden;
}

/* TITULO */

h1{
font-family:'Brush Script MT',cursive;
color:#0F0F0F;
font-size:60px;
margin-top:30px;
text-shadow:2px 2px 8px #ffb6da;
}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:30px;
padding:40px;
width:90%;
margin:auto;
}

/* TARJETAS */

.product{
background:white;
border-radius:30px;
padding:15px;
box-shadow:0 8px 20px rgba(255,105,180,0.4);
cursor:pointer;
transition:transform .3s, box-shadow .3s;
position:relative;
overflow:hidden;
}

.product:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 12px 28px rgba(255,105,180,0.7);
}

/* BRILLO EN TARJETAS */

.product::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent 30%,
rgba(255,255,255,0.8) 50%,
transparent 70%
);
transform:rotate(25deg) translateX(-100%);
transition:transform .6s;
pointer-events:none;
}

.product:hover::before{
transform:rotate(25deg) translateX(100%);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:15px;
}

.nombre{
margin-top:10px;
color:#ff4da6;
font-size:18px;
font-
weight:bold;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
animation:fadeIn .4s ease;
}

.modal-content{
background:white;
width:350px;
margin:10% auto;
padding:20px;
border-radius:25px;
animation:zoomIn .4s ease;
}

.modal img{
width:250px;
border-radius:10px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
color:#ff4da6;
}

/* ANIMALITOS NADANDO */

.once{
position:fixed;
font-size:25px;
animation:nadar 12s linear infinite;
}

@keyframes nadar{
0%{
transform:translateX(-100px) translateY(0px);
}
100%{
transform:translateX(120vw) translateY(20px);
}
}

/* PLANTITAS */

.planta{
position:fixed;
bottom:0;
font-size:30px;
opacity:0.8;
}

</style>

</head>

<body>

<script>

function abrir(producto){

document.getElementById("modal").style.display="block";

document.getElementById("modal-img").src =
producto.querySelector("img").src;

document.getElementById("modal-precio").innerText =
"Precio: " + producto.dataset.precio;

document.getElementById("modal-talla").innerText =
"Talla: " + producto.dataset.talla;

document.getElementById("modal-desc").innerText =
producto.dataset.desc;

}

function cerrar(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Anillos 💍</title>
    <style>
        :root {
            --morado-p: #6a00b3;
            --morado-t: #4a148c;
            --blanco: #ffffff;
        }

        body {
            background: linear-gradient(#e6ccff, #d9b3ff);
            font-family: "Comic Sans MS", cursive, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            text-align: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--morado-p);
            font-size: 45px;
            margin-top: 20px;
            text-shadow: 2px 2px white;
        }

        /* CONTENEDOR DEL CATALOGO */
        .catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* PRODUCTOS */
        .producto {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .producto:hover {
            transform: scale(1.07);
        }

        .producto img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .nombre {
            color: #7a1fd1;
            font-size: 18px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* DESTELLOS ANIMADOS */
        .destello {
            position: fixed;
            top: -10px;
            color: #ffffff;
            font-size: 18px;
            z-index: -1;
            animation: brillo 6s linear infinite;
        }

        @keyframes brillo {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* VENTANA DETALLE (MODAL) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); 
            backdrop-filter: blur(5px);
        }

        .modal-contenido {
            background-color: white;
            margin: 8% auto;
            padding: 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: zoom 0.3s;
        }

        @keyframes zoom { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        .cerrar {
            position: absolute; right: 15px; top: 10px;
            font-size: 30px; cursor: pointer; color: #999;
        }

        #imgDetalle {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .precio-tag { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 10px 25px;
            background: #e6ccff; 
            color: var(--morado-t);
            font-weight: bold; 
            border-radius: 50px;
        }
    </style>
</head>
<body>

    <h1>💍 Catálogo de Anillos 💍</h1>

    <div class="catalogo">
        <div class="producto" onclick="abrir('https://cdn-images.farfetch-contents.com/25/51/87/85/25518785_55631461_1000.jpg', 'Anillo Diamante', 'Diseño con orbe centrado incrustado de cristales talla diamante.', '$2,500 - $3,200')">
            <img src="https://cdn-images.farfetch-contents.com/25/51/87/85/25518785_55631461_1000.jpg">
            <div class="nombre">Anillo Diamante</div>
        </div>

        <div class="producto" onclick="abrir('https://editorialist.com/webcompressed/2025/1/033/990/078/33990078~ss23-p102_1735701535082_0.jpg', 'Anillo Elegante', 'Estilo buckle con banda de cristales y hebilla metálica.', '$2,800 - $3,600')">
            <img src="https://editorialist.com/webcompressed/2025/1/033/990/078/33990078~ss23-p102_1735701535082_0.jpg">
            <div class="nombre">Anillo Elegante</div>
        </div>

        <div class="producto" onclick="abrir('https://d22fxaf9t8d39k.cloudfront.net/a09db87506a29accbce651b111b0146905df49c1272b3a3cfb96ba1c7c4235f4235272.jpg', 'Anillo Plata', 'Anillo fino de banda delgada con orbes pequeños espaciados.', '$1,800 - $2,400')">
            <img src="https://d22fxaf9t8d39k.cloudfront.net/a09db87506a29accbce651b111b0146905df49c1272b3a3cfb96ba1c7c4235f4235272.jpg">
            <div class="nombre">Anillo Plata</div>
        </div>

        <div class="producto" onclick="abrir('https://cdna.lystit.com/photos/5159-2014/04/25/vivienne-westwood-silver-armor-ring-gunmetal-product-1-19523675-4-577402540-normal.jpeg', 'Anillo Corazón', 'Armadura articulada con orbe colgante y detalles grabados.', '$3,500 - $5,000')">
            <img src="https://cdna.lystit.com/photos/5159-2014/04/25/vivienne-westwood-silver-armor-ring-gunmetal-product-1-19523675-4-577402540-normal.jpeg">
            <div class="nombre">Anillo Corazón</div>
        </div>

        <div class="producto" onclick="abrir('https://image-cdn.hypb.st/https://hypebeast.com/image/2020/01/1vivienne-westwood-seal-ring-silver-gold-release-1.jpg?w=960&cbr=1&q=90&fit=max', 'Anillo Brillante', 'Anillo de sello con el emblema del orbe en relieve.', '$2,200 - $2,900')">
            <img src="https://image-cdn.hypb.st/https://hypebeast.com/image/2020/01/1vivienne-westwood-seal-ring-silver-gold-release-1.jpg?w=960&cbr=1&q=90&fit=max">
            <div class="nombre">Anillo Brillante</div>
        </div>

        <div class="producto" onclick="abrir('https://www.viviennewestwood.com/dw/image/v2/BJGV_PRD/on/demandware.static/-/Sites-viviennewestwood-master-catalog/default/dw66e659f2/images/6404018A-01P166-_PLATINUM-BLACK-Resin_004_large.jpg?sw=570&sh=758&sm=fit&q=80', 'Anillo Minimalista', 'Banda de resina y metal con hebilla estilizada en bajorrelieve.', '$2,000 - $2,600')">
            <img src="https://www.viviennewestwood.com/dw/image/v2/BJGV_PRD/on/demandware.static/-/Sites-viviennewestwood-master-catalog/default/dw66e659f2/images/6404018A-01P166-_PLATINUM-BLACK-Resin_004_large.jpg?sw=570&sh=758&sm=fit&q=80">
            <div class="nombre">Anillo Minimalista</div>
        </div>

        <div class="producto" onclick="abrir('https://cdn.clothbase.com/uploads/de1761b2-a581-43ba-9648-6b5e2c21bb85/silver-belt-ring.jpg', 'Anillo Vintage', 'Banda tipo cinturón con logo clásico grabado.', '$3,000 - $4,000')">
            <img src="https://cdn.clothbase.com/uploads/de1761b2-a581-43ba-9648-6b5e2c21bb85/silver-belt-ring.jpg">
            <div class="nombre">Anillo Vintage</div>
        </div>

        <div class="producto" onclick="abrir('https://cdn.clothbase.com/uploads/a062e0e4-80dd-43a4-b38f-bf4e1f587c7f/gunmetal-westminster-ring.jpg', 'Anillo Real', 'Banda de plata oxidada con calados de texto MAN. EST. 1970.', '$2,900 - $3,800')">
            <img src="https://cdn.clothbase.com/uploads/a062e0e4-80dd-43a4-b38f-bf4e1f587c7f/gunmetal-westminster-ring.jpg">
            <div class="nombre">Anillo Real</div>
        </div>

        <div class="producto" onclick="abrir('https://cdn.clothbase.com/uploads/cea4acc8-dbb1-4903-ab14-4216319c05da/silver-reina-petite-ring.jpg', 'Anillo Cristal', 'Diseño solitario clásico con gran orbe de cristal central.', '$2,400 - $3,100')">
            <img src="https://cdn.clothbase.com/uploads/cea4acc8-dbb1-4903-ab14-4216319c05da/silver-reina-petite-ring.jpg">
            <div class="nombre">Anillo Cristal</div>
        </div>

        <div class="producto" onclick="abrir('https://http2.mlstatic.com/D_NQ_NP_906178-MLM85251507190_062025-O-anillo-vivienne-westwood-london-orb.webp', 'Anillo Deluxe', 'Orbe cubierto de cristales con gran detalle y acabado de lujo.', '$3,800 - $5,200')">
            <img src="https://http2.mlstatic.com/D_NQ_NP_906178-MLM85251507190_062025-O-anillo-vivienne-westwood-london-orb.webp">
            <div class="nombre">Anillo Deluxe</div>
        </div>
    </div>

    <div class="destello" style="left:10%;">✦</div>
    <div class="destello" style="left:25%; animation-delay:1s;">✦</div>
    <div class="destello" style="left:40%; animation-delay:2s;">✦</div>
    <div class="destello" style="left:60%; animation-delay:3s;">✦</div>
    <div class="destello" style="left:75%; animation-delay:4s;">✦</div>
    <div class="destello" style="left:90%; animation-delay:1.5s;">✦</div>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrar()">&times;</span>
            <img id="imgDetalle" src="" alt="Detalle">
            <h2 id="txtNombre" style="color: #7a1fd1;"></h2>
            <p id="txtInfo" style="color: #555;"></p>
            <div class="precio-tag" id="txtPrecio"></div>
        </div>
    </div>

    <script>
        function abrir(url, nombre, info, precio) {
            document.getElementById('imgDetalle').src = url;
            document.getElementById('txtNombre').innerText = nombre;
            document.getElementById('txtInfo').innerText = info;
            document.getElementById('txtPrecio').innerText = precio;
            document.getElementById('miModal').style.display = "block";
        }

        function cerrar() {
            document.getElementById('miModal').style.display = "none";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('miModal');
            if (event.target == modal) { cerrar(); }
        }
    </script>

</body>
</html>
